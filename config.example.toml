# system_prompt_label = "acme-coder-v1 (Acme)"
# context_window = 131072

# ── Grok account ───────────────────────────────────────────────────────────
# Models without api_key / api_key_file / env_key use your signed-in session
# (grok login). Built-in catalog models work this way.
