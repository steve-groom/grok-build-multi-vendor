# Multi-vendor example for Grok Build (this fork).
# Copy pieces into ~/.grok/config.toml — never commit real API keys.
#
# ── Key convention ──────────────────────────────────────────────────────────
# For any vendor slug V (together, openai, openrouter, acme, …):
#
#   ~/V_api_key.txt
#   ~/.grok/keys/V.txt
#   ~/.grok/keys/V_api_key.txt
#   $GROK_KEYS_DIR/V.txt
#
# In [model.*] set either:
#   api_key_file = "@together"                 # resolves convention paths
#   api_key_file = "~/together_api_key.txt"    # explicit path
#   env_key = "TOGETHER_API_KEY"               # environment variable
#
# Helpers:
#   ./scripts/add-vendor.sh list
#   ./scripts/add-vendor.sh install together openai
#   ./scripts/add-vendor.sh add --vendor acme --model m --base-url https://api.acme/v1
# See vendors/README.md

[models]
# Use a Grok account model, or a vendor id you installed:
# default = "grok-4.5"
default = "together-glm"

# ── Example: Together.ai (also: vendors/together.toml) ─────────────────────
[model.together-glm]
model = "zai-org/GLM-5.2"
base_url = "https://api.together.ai/v1"
name = "Together GLM 5.2"
api_key_file = "@together"
api_backend = "chat_completions"
system_prompt_label = "zai-org/GLM-5.2 (Together.ai)"
context_window = 262144

[model.together-minimax]
model = "MiniMaxAI/MiniMax-M3"
base_url = "https://api.together.ai/v1"
name = "Together MiniMax M3"
api_key_file = "@together"
api_backend = "chat_completions"
system_prompt_label = "MiniMaxAI/MiniMax-M3 (Together.ai)"
context_window = 524288

[model.together-kimi]
model = "moonshotai/Kimi-K2.7-Code"
base_url = "https://api.together.ai/v1"
name = "Together Kimi K2.7 Code"
api_key_file = "@together"
api_backend = "chat_completions"
system_prompt_label = "moonshotai/Kimi-K2.7-Code (Together.ai)"
context_window = 262144

# ── Example: OpenAI ────────────────────────────────────────────────────────
